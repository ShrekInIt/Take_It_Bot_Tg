name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail

          : "${{ secrets.SERVER_SSH_KEY }}"
          : "${{ secrets.SERVER_HOST }}"
          : "${{ secrets.SERVER_PORT }}"
          : "${{ secrets.SERVER_USER }}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "${{ secrets.SERVER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH smoke test
        shell: bash
        run: |
          set -euo pipefail
          ssh -vvv \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "echo OK && hostname && whoami"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
            set -e

            cd /opt/takeit/repos/Take_It_Bot_Tg
            git pull origin master

            cd /opt/takeit/repos/Send_Order_Take_It_Bot
            git pull origin main

            cd /opt/takeit/compose
            docker compose --env-file /opt/takeit/configs/compose.env up -d --build
          EOF