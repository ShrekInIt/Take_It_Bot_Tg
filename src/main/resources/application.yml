server:
  port: ${SERVER_PORT:8080}
  address: 127.0.0.1
  forward-headers-strategy: framework

  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax
      timeout: 30m

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:take_it_bot}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

bot:
  chat-executors:
    stripes: ${BOT_CHAT_EXECUTOR_STRIPES:4}

confectionery:
  bot:
    url: ${CONFECTIONERY_BOT_URL:http://localhost:8081}
    api-key: ${CONFECTIONERY_BOT_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  file:
    name: ${APP_LOG_FILE:logs/app.log}

