<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-robot" style="font-size: 3rem; color: #667eea;"></i>
        <h2 class="mt-2">Вход в админ-панель</h2>
        <p class="text-muted">Telegram Coffee Bot</p>
    </div>

    <form th:action="@{/admin/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Логин</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Введите логин" required autofocus>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Пароль</label>

            <div class="input-group">
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="Введите пароль"
                       required>

                <button class="btn btn-outline-secondary"
                        type="button"
                        id="togglePassword">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>


        <div class="d-grid">
            <button type="submit" class="btn btn-login btn-lg">
                <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
        </div>
    </form>

    <div class="mt-3">
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            Неверный логин или пароль
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
            Вы успешно вышли из системы
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${param.denied}" class="alert alert-warning alert-dismissible fade show" role="alert">
            У вас нет доступа к этой странице
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <div class="text-center mt-3">
        <small class="text-muted">
            <i class="bi bi-shield-check"></i> Доступ только для администраторов
        </small>
    </div>
</div>

<script>
    const passwordInput = document.getElementById("password");
    const toggleBtn = document.getElementById("togglePassword");
    const icon = toggleBtn.querySelector("i");

    toggleBtn.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";

        passwordInput.type = isPassword ? "text" : "password";

        icon.classList.toggle("bi-eye");
        icon.classList.toggle("bi-eye-slash");
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
