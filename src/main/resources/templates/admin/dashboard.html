<div class="row mb-4">
    <div class="col-12">
        <h2>Дашборд</h2>
        <p class="text-muted">Общая статистика и основные показатели</p>
    </div>
</div>

<div class="d-flex flex-wrap justify-content-between mb-4">
    <div class="card text-white bg-primary flex-grow-1 me-3 mb-3" style="min-width: 180px;">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title">Пользователи</h5>
                <h2 id="totalUsers">0</h2>
                <p class="mb-0" id="newUsersToday">+0 сегодня</p>
            </div>
            <i class="bi bi-people-fill" style="font-size: 2.5rem;"></i>
        </div>
    </div>

    <div class="card text-white bg-success flex-grow-1 me-3 mb-3" style="min-width: 180px;">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title">Заказы</h5>
                <h2 id="totalOrders">0</h2>
                <p class="mb-0">Активные</p>
            </div>
            <i class="bi bi-cart-check-fill" style="font-size: 2.5rem;"></i>
        </div>
    </div>

    <div class="card text-white bg-secondary flex-grow-1 me-3 mb-3" style="min-width: 180px;">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title">Заказы сегодня</h5>
                <h2 id="ordersToday">0</h2>
            </div>
            <i class="bi bi-calendar-check-fill" style="font-size: 2.5rem;"></i>
        </div>
    </div>

    <div class="card text-white bg-warning flex-grow-1 me-3 mb-3" style="min-width: 180px;">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title">Продукты</h5>
                <h2 id="totalProducts">0</h2>
                <p class="mb-0">В наличии</p>
            </div>
            <i class="bi bi-cup-fill" style="font-size: 2.5rem;"></i>
        </div>
    </div>

    <div class="card text-white bg-info flex-grow-1 mb-3" style="min-width: 180px;">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title">Доход</h5>
                <h2 id="todayRevenue">0 ₽</h2>
                <p class="mb-0">За сегодня</p>
            </div>
            <i class="bi bi-currency-exchange" style="font-size: 2.5rem;"></i>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 mb-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Последние заказы</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="recentOrdersTable">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Клиент</th>
                            <th>Сумма</th>
                            <th>Статус</th>
                        </tr>
                        </thead>
                        <tbody id="recentOrdersBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-6 mb-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Новые пользователи</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="recentUsersTable">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Chat ID</th>
                            <th>Дата</th>
                        </tr>
                        </thead>
                        <tbody id="recentUsersBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
