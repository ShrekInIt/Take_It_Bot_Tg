<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3">Продукты</h1>
    <button class="btn btn-primary" id="openCreateProductModal">
      <i class="bi bi-plus"></i> Добавить продукт
    </button>
  </div>

  <div class="d-flex gap-2 align-items-end mb-3">
    <div class="flex-grow-1">
      <label for="productSearchInput" class="form-label">Поиск по названию</label>
      <input id="productSearchInput" type="search" class="form-control" placeholder="Введите название продукта" />
    </div>

    <button class="btn btn-outline-secondary" id="searchProductBtn">
      <i class="bi bi-search"></i> Найти
    </button>

    <button class="btn btn-outline-primary" id="resetProductBtn">
      <i class="bi bi-arrow-clockwise"></i> Сброс
    </button>
  </div>


  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Цена</th>
            <th>Категория</th>
            <th>Наличие</th>
            <th>Действия</th>
          </tr>
          </thead>
          <tbody id="productsTableBody">
          <tr>
            <td colspan="6" class="text-center">Загрузка...</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
