<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4 admin-page-header">
        <h1 class="h3">Категории</h1>
        <button class="btn btn-primary" onclick="showCreateCategoryModal()">
            <i class="bi bi-plus"></i> Добавить категорию
        </button>
    </div>

    <div class="d-flex gap-2 align-items-end mb-3 admin-filter-bar">
        <div class="flex-grow-1">
            <label for="categorySearchInput" class="form-label">Поиск по названию</label>
            <input id="categorySearchInput" type="search" class="form-control" placeholder="Введите название категории" />
        </div>
        <button class="btn btn-outline-secondary" id="searchCategoryBtn"><i class="bi bi-search"></i> Найти</button>
        <button class="btn btn-outline-primary" id="resetCategoryBtn"><i class="bi bi-arrow-clockwise"></i> Сброс</button>
    </div>


    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Описание</th>
                    <th>Родитель</th>
                    <th>Доступность</th>
                    <th>Порядок</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody id="categoriesTableBody">
                <tr>
                    <td colspan="5" class="text-center">Загрузка...</td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>
