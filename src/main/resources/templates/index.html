<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель Telegram бота</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar .nav-link {
            color: #adb5bd;
        }
        .sidebar .nav-link:hover {
            color: #ffffff;
            background-color: #495057;
        }
        .sidebar .nav-link.active {
            color: #ffffff;
            background-color: #0d6efd;
        }
        .main-content {
            padding: 20px;
        }
    </style>
</head>
<body>
<!-- Навигационная панель -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <i class="bi bi-robot"></i> Админ-панель Telegram бота
        </a>
        <div class="d-flex align-items-center">
            <span class="text-white me-3" id="currentUser">Гость</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Боковая панель -->
        <div class="col-md-3 col-lg-2 sidebar">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="showDashboard()">
                            <i class="bi bi-speedometer2"></i> Дашборд
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showUsers()">
                            <i class="bi bi-people"></i> Пользователи
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showCategories()">
                            <i class="bi bi-list-nested"></i> Категории
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showProducts()">
                            <i class="bi bi-cup-straw"></i> Продукты
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showOrders()">
                            <i class="bi bi-receipt"></i> Заказы
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showAdmins()">
                            <i class="bi bi-shield-check"></i> Администраторы
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Основное содержимое -->
        <div class="col-md-9 col-lg-10 main-content">
            <div id="contentArea">
                <div class="text-center my-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                    <p class="mt-3">Загрузка админ-панели...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div id="modalContainer"></div>

<div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>


<!-- Скрипты -->
<!-- Скрипты -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- Корректные пути к файлам: -->
<script src="/static/js/admin-auth.js"></script>
<script src="/static/js/admin-dashboard.js"></script>
<script src="/static/js/admin-users.js"></script>
<script src="/static/js/admin-admins.js"></script>
<script src="/static/js/admin-category.js"></script>
<script src="/static/js/admin-product.js"></script>
<script src="/static/js/admin-order.js"></script>
<script src="/static/js/admin-ToastManager.js"></script> <!-- Исправленное имя -->
<script src="/static/js/admin-scriptPage.js"></script>
<script src="/static/js/admin-manager.js"></script>
</body>

</html>
