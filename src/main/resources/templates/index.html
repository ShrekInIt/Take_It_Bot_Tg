<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель Telegram бота</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar .nav-link {
            color: #adb5bd;
        }
        .sidebar .nav-link:hover {
            color: #ffffff;
            background-color: #495057;
        }
        .sidebar .nav-link.active {
            color: #ffffff;
            background-color: #0d6efd;
        }
        .main-content {
            padding: 20px;
        }

        .admin-nav-brand {
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 62vw;
        }

        .admin-page-header {
            gap: 12px;
        }

        .admin-filter-bar {
            gap: 8px;
        }

        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
            }

            .main-content {
                padding: 12px;
            }

            .admin-page-header,
            .admin-filter-bar {
                display: flex;
                flex-direction: column;
                align-items: stretch !important;
            }

            .admin-page-header .btn,
            .admin-filter-bar .btn {
                width: 100%;
            }

            .table {
                font-size: 0.9rem;
            }

            .modal-dialog {
                margin: 0.5rem;
                max-width: calc(100% - 1rem);
            }

            .admin-metric-cards .card {
                margin-right: 0 !important;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#adminSidebar" aria-controls="adminSidebar" aria-expanded="false" aria-label="Показать меню">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand admin-nav-brand" href="#">
            <i class="bi bi-robot"></i> Админ-панель Telegram бота
        </a>
        <div class="d-flex align-items-center ms-auto">
            <span class="text-white me-2 text-truncate" id="currentUser">Гость</span>
            <button class="btn btn-outline-light btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-12 col-md-3 col-lg-2 sidebar collapse d-md-block" id="adminSidebar">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-nav="dashboard" onclick="showDashboard()">
                        <i class="bi bi-speedometer2"></i> Дашборд
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-nav="users" onclick="showUsers()">
                            <i class="bi bi-people"></i> Пользователи
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-nav="categories" onclick="showCategories()">
                            <i class="bi bi-list-nested"></i> Категории
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-nav="products" onclick="showProducts()">
                            <i class="bi bi-cup-straw"></i> Продукты
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-nav="orders" onclick="showOrders()">
                            <i class="bi bi-receipt"></i> Заказы
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-nav="admins" onclick="showAdmins()">
                            <i class="bi bi-shield-check"></i> Администраторы
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-9 col-lg-10 main-content">
            <div id="contentArea">
                <div class="text-center my-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                    <p class="mt-3">Загрузка админ-панели...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalContainer"></div>

<div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="/static/js/admin-auth.js"></script>
<script src="/static/js/admin-dashboard.js"></script>
<script src="/static/js/admin-users.js"></script>
<script src="/static/js/admin-admins.js"></script>
<script src="/static/js/admin-category.js"></script>
<script src="/static/js/admin-product.js"></script>
<script src="/static/js/admin-order.js"></script>
<script src="/static/js/admin-ToastManager.js"></script>
<script src="/static/js/admin-scriptPage.js"></script>
<script src="/static/js/admin-manager.js"></script>
<script>
    document.addEventListener('click', function (event) {
        const link = event.target.closest('#adminSidebar .nav-link');
        if (!link || window.innerWidth >= 768) return;

        const sidebar = document.getElementById('adminSidebar');
        const sidebarInstance = bootstrap.Collapse.getOrCreateInstance(sidebar, { toggle: false });
        sidebarInstance.hide();
    });
</script>
</body>

</html>
